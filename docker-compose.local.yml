services:
  mock-multimodal:
    build:
      context: .
      dockerfile: serving/mock_multimodal_server/Dockerfile
    environment:
      MOCK_API_KEY: ${MOCK_API_KEY:-EMPTY}
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OPENAI_COMPATIBLE_BASE_URL: http://mock-multimodal:8001/v1
      OPENAI_COMPATIBLE_API_KEY: ${MOCK_API_KEY:-EMPTY}
      DEFAULT_MODEL: Qwen/Qwen3-VL-8B-Instruct
      LOCAL_MOCK_MODE: "true"
      ALLOW_LOCAL_MODEL_DOWNLOAD: "false"
      RESULTS_DIR: /app/results
      REPORTS_DIR: /app/reports
    volumes:
      - ./results:/app/results
      - ./reports:/app/reports
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - mock-multimodal

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

